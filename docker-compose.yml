# Local/prod-like orchestration for vastraas.ai.
#   docker compose up --build
# Put your secrets in a .env file at the repo root (see .env.example).
services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
